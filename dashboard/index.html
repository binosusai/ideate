<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ideate · agent pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Ambient background -->
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="grid-lines"></div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <svg class="brand-mark" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2L18 6.5V13.5L10 18L2 13.5V6.5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="10" cy="10" r="2.5" fill="currentColor"/>
          </svg>
          <span class="brand-name">ideate</span>
        </div>
        <div class="header-right">
          <div class="live-indicator" id="live-indicator">
            <span class="live-dot"></span>
            <span class="live-label" id="live-label">live</span>
          </div>
          <span class="last-updated" id="last-updated"></span>
          <button class="settings-btn" id="settings-btn" aria-label="Settings">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Pipeline -->
    <main class="pipeline-wrapper">
      <div class="pipeline-track" id="pipeline-track">
        <!-- Columns rendered by JS -->
      </div>
    </main>

    <!-- Config / onboarding overlay -->
    <div class="overlay" id="overlay">
      <div class="overlay-card">
        <div class="overlay-brand">
          <svg class="brand-mark lg" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2L18 6.5V13.5L10 18L2 13.5V6.5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="10" cy="10" r="2.5" fill="currentColor"/>
          </svg>
          <span>ideate</span>
        </div>
        <h1>Watch agents work</h1>
        <p>Users can onboard instantly. This dashboard reads tasks through a secure server-side connector.</p>
        <form id="config-form" autocomplete="off">
          <div class="field">
            <label for="repo-input">
              Repository override
              <span class="field-hint">optional · only if admin did not set IDEATE_TASKS_REPO</span>
            </label>
            <input id="repo-input" type="text" placeholder="owner/repo" spellcheck="false" />
          </div>
          <div class="field">
            <label for="idea-input">
              Filter to idea
              <span class="field-hint">optional · leave blank for all</span>
            </label>
            <input id="idea-input" type="number" placeholder="idea ID" min="1" />
          </div>
          <button type="submit" id="connect-btn">
            <span>Apply</span>
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
