name: Ideate Pipeline

on:
  schedule:
    # Run after daily review (09:00 UTC) to process next queued idea.
    - cron: '20 9 * * *'
  workflow_dispatch:
    inputs:
      idea_id:
        description: "Idea ID to process (run `idea list` to find IDs)"
        required: true
        type: string
      stages:
        description: "Comma-separated stages to run"
        required: false
        default: "research,debate,plan,approve,poc,review"
        type: string
      review_outcome:
        description: "POC review outcome when running the review stage"
        required: false
        default: "approve"
        type: choice
        options:
          - approve
          - revise
      review_feedback:
        description: "Feedback for the next iteration when review_outcome=revise"
        required: false
        default: ""
        type: string

jobs:
  # ── Job 1: Research → Debate → Plan ─────────────────────────────────────────
  plan:
    name: Research, debate & plan
    runs-on: ubuntu-latest
    outputs:
      idea_id: ${{ steps.pipeline_meta.outputs.idea_id }}
      stages: ${{ steps.pipeline_meta.outputs.stages }}
      idea_slug: ${{ steps.idea_meta.outputs.slug }}
      idea_title: ${{ steps.idea_meta.outputs.title }}
    permissions:
      contents: write
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      IDEATE_EMAIL_TO: ${{ secrets.IDEATE_EMAIL_TO }}
      IDEATE_EMAIL_FROM: ${{ secrets.IDEATE_EMAIL_FROM }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ideate deps
        run: pip install -e ".[postgres]" agentops

      - name: Configure git identity
        run: |
          git config user.name "ideate-bot"
          git config user.email "ideate-bot@users.noreply.github.com"

      - name: Initialise database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
        run: idea init

      - name: Resolve pipeline inputs
        id: pipeline_meta
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
          INPUT_IDEA_ID: ${{ github.event.inputs.idea_id || '' }}
          INPUT_STAGES: ${{ github.event.inputs.stages || '' }}
        run: |
          python - <<'PY'
          import os
          import psycopg2

          idea_id = (os.environ.get("INPUT_IDEA_ID") or "").strip()
          stages = (os.environ.get("INPUT_STAGES") or "research,debate,plan,approve,poc,review").strip()

          if not idea_id:
            conn = psycopg2.connect(os.environ["DATABASE_URL"])
            try:
              with conn.cursor() as cur:
                cur.execute(
                  """
                  SELECT id
                  FROM ideas
                  WHERE status NOT IN ('handoff', 'completed', 'killed', 'paused')
                    AND COALESCE(tinkered, FALSE) = FALSE
                    AND COALESCE(review_status, 'new') <> 'pending_review'
                  ORDER BY
                    CASE category WHEN 'money' THEN 0 ELSE 1 END,
                    score DESC,
                    updated_at DESC
                  LIMIT 1
                  """
                )
                row = cur.fetchone()
                idea_id = str(row[0]) if row else "0"
            finally:
              conn.close()

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"idea_id={idea_id}\n")
            fh.write(f"stages={stages}\n")
          print(f"Resolved idea_id={idea_id}, stages={stages}")
          PY

      - name: No queued idea
        if: steps.pipeline_meta.outputs.idea_id == '0'
        run: echo "No eligible idea found in DB. Skipping this scheduled pipeline run."

      - name: Resolve idea metadata
        if: steps.pipeline_meta.outputs.idea_id != '0'
        id: idea_meta
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IDEA_ID: ${{ steps.pipeline_meta.outputs.idea_id }}
        run: |
          python - <<'PY'
          import os
          import psycopg2

          idea_id = int(os.environ["IDEA_ID"])
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          try:
            with conn.cursor() as cur:
              cur.execute(
                "SELECT slug, title FROM ideas WHERE id = %s",
                (idea_id,),
              )
              row = cur.fetchone()
            if not row:
              raise SystemExit(f"idea {idea_id} not found")
            slug, title = row
            with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"slug={slug}\n")
              fh.write(f"title={title}\n")
          finally:
            conn.close()
          PY

      - name: Print resolved idea
        if: steps.pipeline_meta.outputs.idea_id != '0'
        run: |
          echo "Resolved idea selection"
          echo "  id:    ${{ steps.pipeline_meta.outputs.idea_id }}"
          echo "  title: ${{ steps.idea_meta.outputs.title }}"
          echo "  slug:  ${{ steps.idea_meta.outputs.slug }}"
          {
            echo "## Resolved Idea"
            echo "- ID: ${{ steps.pipeline_meta.outputs.idea_id }}"
            echo "- Title: ${{ steps.idea_meta.outputs.title }}"
            echo "- Slug: ${{ steps.idea_meta.outputs.slug }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create task board todos
        if: steps.pipeline_meta.outputs.idea_id != '0'
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
          GH_TOKEN:         ${{ secrets.GH_PAT }}
        run: idea board-setup ${{ steps.pipeline_meta.outputs.idea_id }} --stages "${{ steps.pipeline_meta.outputs.stages }}"

      - name: Research
        if: steps.pipeline_meta.outputs.idea_id != '0' && contains(steps.pipeline_meta.outputs.stages, 'research')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN:         ${{ secrets.GH_PAT }}
          IDEATE_MODEL_RESEARCH: gpt-4.1
          IDEATE_PARALLEL: "1"
          IDEATE_MAX_PARALLEL_AGENTS: "4"
          IDEATE_REQUIRE_LLM: "1"
        run: idea research ${{ steps.pipeline_meta.outputs.idea_id }}

      - name: Debate
        if: steps.pipeline_meta.outputs.idea_id != '0' && contains(steps.pipeline_meta.outputs.stages, 'debate')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN:         ${{ secrets.GH_PAT }}
          IDEATE_MODEL_DEBATE: gpt-4.1
          IDEATE_STRICT_DEBATE: "1"
          IDEATE_PARALLEL: "1"
          IDEATE_MAX_PARALLEL_AGENTS: "4"
          IDEATE_REQUIRE_LLM: "1"
        run: idea debate ${{ steps.pipeline_meta.outputs.idea_id }}

      - name: Plan
        if: steps.pipeline_meta.outputs.idea_id != '0' && contains(steps.pipeline_meta.outputs.stages, 'plan')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN:         ${{ secrets.GH_PAT }}
          IDEATE_MODEL_PLANNING: gpt-4.1-mini
          IDEATE_PARALLEL: "1"
          IDEATE_MAX_PARALLEL_AGENTS: "5"
          IDEATE_REQUIRE_LLM: "1"
          IDEATE_HOME:      ${{ github.workspace }}
        run: idea plan ${{ steps.pipeline_meta.outputs.idea_id }}

      - name: Build proposal email body
        if: steps.pipeline_meta.outputs.idea_id != '0' && contains(steps.pipeline_meta.outputs.stages, 'plan')
        env:
          IDEA_ID: ${{ steps.pipeline_meta.outputs.idea_id }}
          IDEA_SLUG: ${{ steps.idea_meta.outputs.slug }}
          IDEA_TITLE: ${{ steps.idea_meta.outputs.title }}
        run: |
          {
            echo "Ideate Proposal"
            echo "Idea ID: $IDEA_ID"
            echo "Title: $IDEA_TITLE"
            echo "Slug: $IDEA_SLUG"
            echo
            echo "=== Research ==="
            cat "ideas/$IDEA_SLUG/research.md"
            echo
            echo "=== Debate ==="
            cat "ideas/$IDEA_SLUG/debate.md"
            echo
            echo "=== Implementation Plan ==="
            cat "ideas/$IDEA_SLUG/implementation_plan.md"
          } > /tmp/proposal_email.txt

      - name: Upload proposal artifacts
        if: steps.pipeline_meta.outputs.idea_id != '0' && contains(steps.pipeline_meta.outputs.stages, 'plan')
        uses: actions/upload-artifact@v4
        with:
          name: idea-${{ steps.pipeline_meta.outputs.idea_id }}-proposal
          path: |
            ideas/${{ steps.idea_meta.outputs.slug }}/research.md
            ideas/${{ steps.idea_meta.outputs.slug }}/debate.md
            ideas/${{ steps.idea_meta.outputs.slug }}/implementation_plan.md

      - name: Email proposal
        if: steps.pipeline_meta.outputs.idea_id != '0' && contains(steps.pipeline_meta.outputs.stages, 'plan') && env.SMTP_HOST != '' && env.SMTP_USER != '' && env.SMTP_PASS != '' && env.IDEATE_EMAIL_TO != '' && env.IDEATE_EMAIL_FROM != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT || '587' }}
          secure: false
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: Ideate proposal for idea #${{ steps.pipeline_meta.outputs.idea_id }} - ${{ steps.idea_meta.outputs.title }}
          to: ${{ env.IDEATE_EMAIL_TO }}
          from: ${{ env.IDEATE_EMAIL_FROM }}
          body: file:///tmp/proposal_email.txt

      - name: Commit planning files back to repo
        if: steps.pipeline_meta.outputs.idea_id != '0' && contains(steps.pipeline_meta.outputs.stages, 'plan')
        run: |
          git add ideas/ || true
          git diff --cached --quiet || git commit -m "chore: planning files for idea ${{ steps.pipeline_meta.outputs.idea_id }} [skip ci]"
          git push

      - name: Build status dashboard
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
        run: |
          python - <<'PY'
          import os
          import psycopg2

          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          try:
            with conn.cursor() as cur:
              cur.execute(
                """
                SELECT status, COUNT(*)
                FROM ideas
                GROUP BY status
                ORDER BY COUNT(*) DESC, status ASC
                """
              )
              status_rows = cur.fetchall()
              cur.execute(
                """
                SELECT id, title, status, score
                FROM ideas
                ORDER BY
                  CASE category WHEN 'money' THEN 0 ELSE 1 END,
                  score DESC,
                  updated_at DESC
                LIMIT 12
                """
              )
              ideas = cur.fetchall()
          finally:
            conn.close()

          lines = [
            "# Ideate Status Dashboard",
            "",
            "## Status Counts",
          ]
          if not status_rows:
            lines.append("- No ideas found")
          else:
            lines.extend(f"- {status}: {count}" for status, count in status_rows)
          lines += ["", "## Top Ideas", "| ID | Title | Status | Score |", "|---|---|---|---|"]
          for idea_id, title, status, score in ideas:
            safe_title = str(title).replace("|", "\\|")
            lines.append(f"| {idea_id} | {safe_title} | {status} | {float(score):.1f} |")
          if not ideas:
            lines.append("| - | No ideas | - | - |")

          with open("/tmp/ideate-status-dashboard.md", "w", encoding="utf-8") as f:
            f.write("\n".join(lines) + "\n")
          PY
          cat /tmp/ideate-status-dashboard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload status dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ideate-status-dashboard
          path: /tmp/ideate-status-dashboard.md

  # ── Job 2: POC — requires manual approval via the 'poc-approval' environment ─
  poc:
    name: Build POC & create repo
    needs: plan
    if: needs.plan.outputs.idea_id != '0' && contains(needs.plan.outputs.stages, 'poc')
    runs-on: ubuntu-latest
    # ⬇ This line makes GitHub pause here and email you for approval
    environment: poc-approval

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ideate deps
        run: pip install -e ".[postgres]" agentops

      - name: Approve idea
        if: needs.plan.outputs.idea_id != '0' && contains(needs.plan.outputs.stages, 'approve')
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
        run: |
          echo "Approved idea"
          echo "  id:    ${{ needs.plan.outputs.idea_id }}"
          echo "  title: ${{ needs.plan.outputs.idea_title }}"
          echo "  slug:  ${{ needs.plan.outputs.idea_slug }}"
          idea approve ${{ needs.plan.outputs.idea_id }} --rationale "Approved via poc-approval environment gate."

      - name: Build POC & push new repo
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
          AGENTOPS_API_KEY:  ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:      gpt-4.1-nano
          IDEATE_HOME:       ${{ github.workspace }}
          IDEATE_POC_HOME:   /tmp/pocs
          IDEATE_GITHUB_ORG: binosusai
          GH_TOKEN:          ${{ secrets.GH_PAT }}
        run: |
          echo "POC idea"
          echo "  id:    ${{ needs.plan.outputs.idea_id }}"
          echo "  title: ${{ needs.plan.outputs.idea_title }}"
          echo "  slug:  ${{ needs.plan.outputs.idea_slug }}"
          idea poc ${{ needs.plan.outputs.idea_id }} --force

  review:
    name: Review generated POC
    needs: plan
    runs-on: ubuntu-latest
    if: needs.plan.outputs.idea_id != '0' && contains(needs.plan.outputs.stages, 'review')
    environment: poc-review

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ideate deps
        run: pip install -e ".[postgres]" agentops

      - name: Record POC review outcome
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IDEATE_REQUIRE_DATABASE_URL: "1"
          REVIEW_OUTCOME: ${{ github.event.inputs.review_outcome || 'approve' }}
          REVIEW_FEEDBACK: ${{ github.event.inputs.review_feedback || '' }}
        run: |
          echo "Reviewing POC"
          echo "  id:      ${{ needs.plan.outputs.idea_id }}"
          echo "  title:   ${{ needs.plan.outputs.idea_title }}"
          echo "  outcome: $REVIEW_OUTCOME"
          idea review ${{ needs.plan.outputs.idea_id }} --decision "$REVIEW_OUTCOME" --feedback "$REVIEW_FEEDBACK"
