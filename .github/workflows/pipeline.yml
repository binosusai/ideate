name: Ideate Pipeline

on:
  workflow_dispatch:
    inputs:
      idea_id:
        description: "Idea ID to process (run `idea list` to find IDs)"
        required: true
        type: string
      stages:
        description: "Comma-separated stages to run"
        required: false
        default: "research,debate,plan,approve,poc"
        type: string

jobs:
  pipeline:
    name: Run idea pipeline
    runs-on: ubuntu-latest
    # Allow the job to push planning files back and create repos
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT so git push and gh repo create work under the org
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ideate deps
        run: pip install -e ".[postgres]" agentops

      - name: Configure git identity
        run: |
          git config user.name "ideate-bot"
          git config user.email "ideate-bot@users.noreply.github.com"

      - name: Initialise database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: idea init

      - name: Research
        if: contains(inputs.stages, 'research')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:     gpt-4.1-nano
        run: idea research ${{ inputs.idea_id }}

      - name: Debate
        if: contains(inputs.stages, 'debate')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:     gpt-4.1-nano
        run: idea debate ${{ inputs.idea_id }}

      - name: Plan
        if: contains(inputs.stages, 'plan')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:     gpt-4.1-nano
          # Write planning files into this checkout under ideate/ideas/
          IDEATE_HOME:      ${{ github.workspace }}
        run: idea plan ${{ inputs.idea_id }}

      - name: Commit planning files back to repo
        if: contains(inputs.stages, 'plan')
        run: |
          git add ideate/ideas/ || true
          git diff --cached --quiet || git commit -m "chore: add planning files for idea ${{ inputs.idea_id }} [skip ci]"
          git push

      - name: Approve
        if: contains(inputs.stages, 'approve')
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: idea approve ${{ inputs.idea_id }} --rationale "Auto-approved after planning pass in CI."

      - name: POC
        if: contains(inputs.stages, 'poc')
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY:    ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:        gpt-4.1-nano
          IDEATE_HOME:         ${{ github.workspace }}
          # Write POC source code to a temp dir; _init_poc_repo will push it to GitHub
          IDEATE_POC_HOME:     /tmp/pocs
          IDEATE_GITHUB_ORG:   binosusai
          # gh CLI reads GH_TOKEN; PAT must have repo + org scope to create repos
          GH_TOKEN:            ${{ secrets.GH_PAT }}
        run: idea poc ${{ inputs.idea_id }} --force
