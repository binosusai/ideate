name: Ideate Pipeline

on:
  workflow_dispatch:
    inputs:
      idea_id:
        description: "Idea ID to process (run `idea list` to find IDs)"
        required: true
        type: string
      stages:
        description: "Comma-separated stages to run"
        required: false
        default: "research,debate,plan,approve,poc"
        type: string

jobs:
  # ── Job 1: Research → Debate → Plan ─────────────────────────────────────────
  plan:
    name: Research, debate & plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      IDEATE_EMAIL_TO: ${{ secrets.IDEATE_EMAIL_TO }}
      IDEATE_EMAIL_FROM: ${{ secrets.IDEATE_EMAIL_FROM }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ideate deps
        run: pip install -e ".[postgres]" agentops

      - name: Configure git identity
        run: |
          git config user.name "ideate-bot"
          git config user.email "ideate-bot@users.noreply.github.com"

      - name: Initialise database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: idea init

      - name: Research
        if: contains(inputs.stages, 'research')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL_RESEARCH: gpt-4.1
          IDEATE_PARALLEL: "1"
          IDEATE_MAX_PARALLEL_AGENTS: "4"
          IDEATE_REQUIRE_LLM: "1"
        run: idea research ${{ inputs.idea_id }}

      - name: Debate
        if: contains(inputs.stages, 'debate')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL_DEBATE: gpt-4.1
          IDEATE_STRICT_DEBATE: "1"
          IDEATE_PARALLEL: "1"
          IDEATE_MAX_PARALLEL_AGENTS: "4"
          IDEATE_REQUIRE_LLM: "1"
        run: idea debate ${{ inputs.idea_id }}

      - name: Plan
        if: contains(inputs.stages, 'plan')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL_PLANNING: gpt-4.1-mini
          IDEATE_PARALLEL: "1"
          IDEATE_MAX_PARALLEL_AGENTS: "5"
          IDEATE_REQUIRE_LLM: "1"
          IDEATE_HOME:      ${{ github.workspace }}
        run: idea plan ${{ inputs.idea_id }}

      - name: Resolve idea metadata
        if: contains(inputs.stages, 'plan')
        id: idea_meta
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IDEA_ID: ${{ inputs.idea_id }}
        run: |
          python - <<'PY'
          import os
          import psycopg2

          idea_id = int(os.environ["IDEA_ID"])
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          try:
            with conn.cursor() as cur:
              cur.execute("SELECT slug, title FROM ideas WHERE id = %s", (idea_id,))
              row = cur.fetchone()
            if not row:
              raise SystemExit(f"idea {idea_id} not found")
            slug, title = row
            with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"slug={slug}\n")
              fh.write(f"title={title}\n")
          finally:
            conn.close()
          PY

      - name: Build proposal email body
        if: contains(inputs.stages, 'plan')
        env:
          IDEA_ID: ${{ inputs.idea_id }}
          IDEA_SLUG: ${{ steps.idea_meta.outputs.slug }}
          IDEA_TITLE: ${{ steps.idea_meta.outputs.title }}
        run: |
          {
            echo "Ideate Proposal"
            echo "Idea ID: $IDEA_ID"
            echo "Title: $IDEA_TITLE"
            echo "Slug: $IDEA_SLUG"
            echo
            echo "=== Research ==="
            cat "ideas/$IDEA_SLUG/research.md"
            echo
            echo "=== Debate ==="
            cat "ideas/$IDEA_SLUG/debate.md"
            echo
            echo "=== Implementation Plan ==="
            cat "ideas/$IDEA_SLUG/implementation_plan.md"
          } > /tmp/proposal_email.txt

      - name: Upload proposal artifacts
        if: contains(inputs.stages, 'plan')
        uses: actions/upload-artifact@v4
        with:
          name: idea-${{ inputs.idea_id }}-proposal
          path: |
            ideas/${{ steps.idea_meta.outputs.slug }}/research.md
            ideas/${{ steps.idea_meta.outputs.slug }}/debate.md
            ideas/${{ steps.idea_meta.outputs.slug }}/implementation_plan.md

      - name: Email proposal
        if: contains(inputs.stages, 'plan') && env.SMTP_HOST != '' && env.SMTP_USER != '' && env.SMTP_PASS != '' && env.IDEATE_EMAIL_TO != '' && env.IDEATE_EMAIL_FROM != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT || '587' }}
          secure: false
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: Ideate proposal for idea #${{ inputs.idea_id }} - ${{ steps.idea_meta.outputs.title }}
          to: ${{ env.IDEATE_EMAIL_TO }}
          from: ${{ env.IDEATE_EMAIL_FROM }}
          body: file:///tmp/proposal_email.txt

      - name: Commit planning files back to repo
        if: contains(inputs.stages, 'plan')
        run: |
          git add ideas/ || true
          git diff --cached --quiet || git commit -m "chore: planning files for idea ${{ inputs.idea_id }} [skip ci]"
          git push

  # ── Job 2: POC — requires manual approval via the 'poc-approval' environment ─
  poc:
    name: Build POC & create repo
    needs: plan
    runs-on: ubuntu-latest
    # ⬇ This line makes GitHub pause here and email you for approval
    environment: poc-approval

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ideate deps
        run: pip install -e ".[postgres]" agentops

      - name: Approve idea
        if: contains(inputs.stages, 'approve')
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: idea approve ${{ inputs.idea_id }} --rationale "Approved via poc-approval environment gate."

      - name: Build POC & push new repo
        if: contains(inputs.stages, 'poc')
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY:  ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:      gpt-4.1-nano
          IDEATE_HOME:       ${{ github.workspace }}
          IDEATE_POC_HOME:   /tmp/pocs
          IDEATE_GITHUB_ORG: binosusai
          GH_TOKEN:          ${{ secrets.GH_PAT }}
        run: idea poc ${{ inputs.idea_id }} --force
