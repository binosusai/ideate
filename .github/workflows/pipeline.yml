name: Ideate Pipeline

on:
  workflow_dispatch:
    inputs:
      idea_id:
        description: "Idea ID to process (run `idea list` to find IDs)"
        required: true
        type: string
      stages:
        description: "Comma-separated stages to run"
        required: false
        default: "research,debate,plan,approve,poc"
        type: string

jobs:
  # ── Job 1: Research → Debate → Plan ─────────────────────────────────────────
  plan:
    name: Research, debate & plan
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ideate deps
        run: pip install -e ".[postgres]" agentops

      - name: Configure git identity
        run: |
          git config user.name "ideate-bot"
          git config user.email "ideate-bot@users.noreply.github.com"

      - name: Initialise database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: idea init

      - name: Research
        if: contains(inputs.stages, 'research')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:     gpt-4.1-nano
        run: idea research ${{ inputs.idea_id }}

      - name: Debate
        if: contains(inputs.stages, 'debate')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:     gpt-4.1-nano
        run: idea debate ${{ inputs.idea_id }}

      - name: Plan
        if: contains(inputs.stages, 'plan')
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY: ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:     gpt-4.1-nano
          IDEATE_HOME:      ${{ github.workspace }}
        run: idea plan ${{ inputs.idea_id }}

      - name: Commit planning files back to repo
        if: contains(inputs.stages, 'plan')
        run: |
          git add ideate/ideas/ || true
          git diff --cached --quiet || git commit -m "chore: planning files for idea ${{ inputs.idea_id }} [skip ci]"
          git push

  # ── Job 2: POC — requires manual approval via the 'poc-approval' environment ─
  poc:
    name: Build POC & create repo
    needs: plan
    runs-on: ubuntu-latest
    # ⬇ This line makes GitHub pause here and email you for approval
    environment: poc-approval

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ideate deps
        run: pip install -e ".[postgres]" agentops

      - name: Approve idea
        if: contains(inputs.stages, 'approve')
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: idea approve ${{ inputs.idea_id }} --rationale "Approved via poc-approval environment gate."

      - name: Build POC & push new repo
        if: contains(inputs.stages, 'poc')
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          AGENTOPS_API_KEY:  ${{ secrets.AGENTOPS_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          IDEATE_MODEL:      gpt-4.1-nano
          IDEATE_HOME:       ${{ github.workspace }}
          IDEATE_POC_HOME:   /tmp/pocs
          IDEATE_GITHUB_ORG: binosusai
          GH_TOKEN:          ${{ secrets.GH_PAT }}
        run: idea poc ${{ inputs.idea_id }} --force
