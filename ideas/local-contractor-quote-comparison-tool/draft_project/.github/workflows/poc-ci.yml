name: POC checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile backend
        run: python -m py_compile backend/app.py
